# CircleCI setup workflow (dynamic config).
#
# This file is the entry point for every pipeline. The real build/test config
# lives in `continue-config.yml`; we use `path-filtering` on PRs to decide
# whether 1st-gen and/or 2nd-gen test jobs should run, then continue to it.
#
# Decision matrix:
#   - Changes only under `1st-gen/**`     → run 1st-gen jobs only.
#   - Changes only under `2nd-gen/**`     → run 2nd-gen jobs only.
#   - Any change outside both directories → run both (root files are shared).
#   - On `main`, always run both gens     → skip path-filtering entirely.
version: 2.1

setup: true

orbs:
  path-filtering: circleci/path-filtering@1.3.0
  continuation: circleci/continuation@2.0.0

jobs:
  continue-all:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - checkout
      - continuation/continue:
          configuration_path: .circleci/continue-config.yml
          parameters: '{"run_1st_gen":true,"run_2nd_gen":true}'

workflows:
  # Path-filter on non-main branches: diff against main and set
  # run_1st_gen / run_2nd_gen based on the files touched.
  filter-on-pr:
    when:
      not:
        equal: [main, << pipeline.git.branch >>]
    jobs:
      - path-filtering/filter:
          name: filter-paths
          base-revision: main
          # Mapping format: <regex> <param-name> <param-value>
          # Negative lookahead means a path NOT under the listed prefix.
          mapping: |
            ^(?!2nd-gen/).* run_1st_gen true
            ^(?!1st-gen/).* run_2nd_gen true
          config-path: .circleci/continue-config.yml

  # On main, always continue with both gens enabled. Path-filtering against
  # `main` while running on `main` would diff against itself, so we bypass it.
  run-all-on-main:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs:
      - continue-all
