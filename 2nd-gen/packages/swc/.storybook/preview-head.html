<!-- This preconnect opens the connection for typekit to more quickly load fonts -->
<link rel="preconnect" href="https://use.typekit.net" crossorigin />
<link rel="dns-prefetch" href="https://use.typekit.net" />
<!-- For Adobe Clean Spectrum VF font support -->
<link rel="stylesheet" href="https://use.typekit.net/obc6cux.css" />

<style>
    /* Fix for Storybook's zoom wrapper interfering with forced-colors mode */
    @media (forced-colors: active) {
        .innerZoomElementWrapper.innerZoomElementWrapper.innerZoomElementWrapper
            > * {
            border: none !important;
        }
    }

    /* Ensure an adaptive-capable background */
    .sbdocs-preview {
        background-color: var(
            --swc-gray-25,
            light-dark(rgb(255 255 255), rgb(17 17 17))
        ) !important;
    }
</style>

<!-- This is the script that attempts to pre-load the typekit fonts -->
<script>
    window.global = window;

    let isLoading = false;

    const script = document.createElement('script');
    script.src = '//use.typekit.net/obc6cux.js';
    script.type = 'text/javascript';
    script.async = 'true';
    script.onload = script.onreadystatechange = function () {
        const readyState = this.readyState;
        if (
            isLoading ||
            (readyState && readyState != 'complete' && readyState != 'loaded')
        )
            return;
        isLoading = true;

        try {
            Typekit.load({
                kitId: 'obc6cux',
                async: true,
                scriptTimeout: 3000,
                // https://github.com/typekit/webfontloader?tab=readme-ov-file#configuration
                loading: function () {
                    window.FontsLoading = true;
                },
                active: function () {
                    window.FontsLoading = false;
                    window.currentKitId = this.kitId;
                    console.log(`Font loaded [id: ${this.kitId}]`);

                    // Fire a custom event to indicate the Adobe Fonts have loaded
                    document.dispatchEvent(
                        new CustomEvent('typekit-loaded', {
                            detail: { kitId: this.kitId },
                        })
                    );
                },
            });
        } catch (e) {
            console.log(e);
        }
    };

    const firstScript = document.getElementsByTagName('script')[0];
    firstScript.parentNode.insertBefore(script, firstScript);
</script>
