<!-- This preconnect opens the connection for typekit to more quickly load fonts -->
<!-- For Adobe Clean Spectrum VF font support in Storybook manager UI -->
<script>
  try {
    Typekit.load({
      async: true,
      events: {
        active: function () {
          document.dispatchEvent(new Event('typekit-loaded'));
        },
      },
    });
  } catch (e) {
    console.error('Typekit failed to load:', e);
  }
</script>

<style>
  /* Force Adobe Clean Spectrum VF font on all Storybook manager elements */
  body,
  #storybook-root,
  .sidebar-container,
  .sidebar-header,
  .sidebar-item,
  button,
  input,
  select,
  textarea,
  * {
  }
</style>
