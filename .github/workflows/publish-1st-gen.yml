name: Release

on:
    push:
        branches:
            - ruben/swc-1405-suggestions
    workflow_dispatch:
        inputs:
            tag:
                description: 'NPM dist-tag (defaults to "latest" for manual releases)'
                required: false
                default: 'snapshot'

jobs:
    check:
        runs-on: ubuntu-latest
        outputs:
            found: ${{ steps.changesets.outputs.found }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Check for changesets
              id: changesets
              run: |
                  if ls .changeset/*.md 2>/dev/null | grep -qv README; then
                    echo "found=true" >> $GITHUB_OUTPUT
                  else
                    echo "found=false" >> $GITHUB_OUTPUT
                    echo "No changesets found — skipping publish"
                  fi

    publish:
        needs: check
        if: needs.check.outputs.found == 'true'
        runs-on: ubuntu-latest
        environment: npm-publish
        permissions:
            id-token: write # Required for OIDC trusted publishing (1st-gen)
            contents: write # Required for git push on latest releases
        env:
            YARN_ENABLE_IMMUTABLE_INSTALLS: false
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup job and install dependencies
              uses: ./.github/actions/setup-job

            - name: Determine release type
              id: release
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    TAG="${{ github.event.inputs.tag }}"
                    TAG="${TAG:-latest}"
                    IS_RELEASE=$( [ "$TAG" = "latest" ] && echo "true" || echo "false" )
                  else
                    TAG="next"
                    IS_RELEASE="false"
                  fi
                  echo "tag=$TAG" >> $GITHUB_OUTPUT
                  echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
                  echo "Release type: tag=$TAG, is_release=$IS_RELEASE"

            - name: Set git identity
              run: |
                  git config user.email "support+actions@github.com"
                  git config user.name "github-actions-bot"

            - name: Generate custom elements manifests
              run: yarn workspace @spectrum-web-components/1st-gen custom-element-json

            - name: Confirm build artifacts
              run: yarn workspace @spectrum-web-components/1st-gen build:confirm

            - name: Version packages
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ steps.release.outputs.tag }}"
                  if [ "$TAG" = "latest" ]; then
                    yarn workspace @spectrum-web-components/1st-gen changelog:global
                    yarn changeset version
                  else
                    yarn changeset version --snapshot "$TAG"
                  fi

            - name: Rebuild after versioning
              run: |
                  yarn install --refresh-lockfile
                  yarn build

            - name: Configure npm authentication
              run: |
                  echo "//registry.npmjs.org/:_authToken=${{ secrets.ADOBE_BOT_NPM_TOKEN }}" > ~/.npmrc

            - name: Publish packages
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
              run: |
                  TAG="${{ steps.release.outputs.tag }}"
                  if [ "$TAG" = "latest" ]; then
                    yarn changeset publish --no-git-tag
                  else
                    yarn changeset publish --no-git-tag --tag "$TAG"
                  fi

            - name: Build and publish React wrappers
              run: |
                  TAG="${{ steps.release.outputs.tag }}"
                  yarn workspace @spectrum-web-components/1st-gen build:react
                  cd 1st-gen/react
                  if [ "$TAG" = "latest" ]; then
                    PUBLISH_CMD="npm publish --access public"
                  else
                    PUBLISH_CMD="npm publish --tag $TAG --access public"
                  fi
                  for dir in */; do
                    (cd "$dir" && $PUBLISH_CMD) || true
                  done

            - name: Commit release and tag
              if: steps.release.outputs.is_release == 'true'
              run: |
                  git add .
                  git commit -m "chore: release packages" || echo "No changes to commit"
                  git push
                  node ./1st-gen/scripts/create-git-tag.js
