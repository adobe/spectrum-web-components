name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'NPM dist-tag (e.g., latest, beta, snapshot)'
        required: false
        default: 'next'
      scope:
        description: 'Packages to publish: all (1st-gen + 2nd-gen) or 2nd-gen (core + @adobe/spectrum-wc only)'
        required: false
        type: choice
        default: all
        options:
          - all
          - 2nd-gen
      dry_run:
        description: 'Dry run the 2nd-gen publish: build, pack, and npm publish --dry-run only. Does not bump versions, write changelogs, or delete changesets.'
        required: false
        type: boolean
        default: false
  pull_request:
    types: [labeled, synchronize]
  push:
    branches:
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-changesets:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'snapshot-release'))
    outputs:
      has_changesets: ${{ steps.check.outputs.has_changesets }}
      has_1st_gen_changesets: ${{ steps.check.outputs.has_1st_gen_changesets }}
      has_2nd_gen_changesets: ${{ steps.check.outputs.has_2nd_gen_changesets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changesets
        id: check
        run: |
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            echo "has_1st_gen_changesets=false" >> $GITHUB_OUTPUT
            echo "has_2nd_gen_changesets=false" >> $GITHUB_OUTPUT
            echo "No changesets found - skipping publish"
          else
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            CHANGESET_COUNT=$(ls -1 .changeset/*.md 2>/dev/null | grep -v README | wc -l | tr -d ' ')
            echo "Found $CHANGESET_COUNT changesets"

            # Check if any changeset mentions 1st-gen packages
            # 1st-gen packages are @spectrum-web-components/* except core
            HAS_1ST_GEN=false
            HAS_2ND_GEN=false
            for file in .changeset/*.md; do
              if [ "$(basename "$file")" != "README.md" ]; then
                PACKAGES=$(grep -oP "@spectrum-web-components/[a-z-]+" "$file" || true)
                NON_CORE=$(echo "$PACKAGES" | grep -v "^@spectrum-web-components/core$" || true)
                if [ -n "$NON_CORE" ]; then
                  HAS_1ST_GEN=true
                fi
                if grep -qE "@adobe/spectrum-wc-core|@adobe/spectrum-wc|@spectrum-web-components/core" "$file"; then
                  HAS_2ND_GEN=true
                fi
              fi
            done

            echo "has_1st_gen_changesets=$HAS_1ST_GEN" >> $GITHUB_OUTPUT
            echo "has_2nd_gen_changesets=$HAS_2ND_GEN" >> $GITHUB_OUTPUT
            if [ "$HAS_1ST_GEN" = "true" ]; then
              echo "Found 1st-gen changesets - React wrappers will be built and published"
            else
              echo "No 1st-gen changesets found - React wrappers will be skipped"
            fi
            if [ "$HAS_2ND_GEN" = "true" ]; then
              echo "Found 2nd-gen changesets - scope=2nd-gen publish can run"
            else
              echo "No 2nd-gen changesets found - scope=2nd-gen publish will be skipped"
            fi
          fi

  publish:
    needs: check-changesets
    if: >-
      needs.check-changesets.outputs.has_changesets == 'true' &&
      (github.event.inputs.scope != '2nd-gen' ||
      needs.check-changesets.outputs.has_2nd_gen_changesets == 'true')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write # Required for OIDC trusted publishing (1st-gen )
      contents: write # Required for git push
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup job and install dependencies
        uses: ./.github/actions/setup-job

      - name: Set Git identity
        run: |
          git config --global user.email "support+actions@github.com"
          git config --global user.name "github-actions-bot"

      - name: Determine release tag
        id: extract-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_SCOPE: ${{ github.event.inputs.scope }}
        run: |
          if [ "$EVENT_NAME" == "pull_request" ]; then
            # PRs with the snapshot-release label always use snapshot-test
            WORKFLOW_TAG="snapshot-test"
          elif [ -n "$INPUT_TAG" ]; then
            # Use the tag provided via workflow_dispatch input
            WORKFLOW_TAG="$INPUT_TAG"
          else
            # Default tag for push-triggered runs
            WORKFLOW_TAG="next"
          fi

          # Publish scope only applies to manual runs; everything else publishes all packages
          if [ "$EVENT_NAME" == "workflow_dispatch" ] && [ "$INPUT_SCOPE" == "2nd-gen" ]; then
            WORKFLOW_SCOPE="2nd-gen"
          else
            WORKFLOW_SCOPE="all"
          fi

          echo "tag=$WORKFLOW_TAG" >> $GITHUB_OUTPUT
          echo "scope=$WORKFLOW_SCOPE" >> $GITHUB_OUTPUT
          echo "Using npm tag: $WORKFLOW_TAG"
          echo "Publish scope: $WORKFLOW_SCOPE"

      - name: Validate release tag
        env:
          TAG: ${{ steps.extract-tag.outputs.tag }}
          SCOPE: ${{ steps.extract-tag.outputs.scope }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$TAG" == "latest" ] && [ "$GIT_REF" != "refs/heads/main" ]; then
            echo "ERROR: Cannot publish 'latest' from non-main branch"
            exit 1
          fi
          if [ "$SCOPE" == "2nd-gen" ] && [ "$TAG" == "latest" ]; then
            echo "ERROR: 2nd-gen-only scope does not support the 'latest' tag; use a pre-release tag such as 'beta'"
            exit 1
          fi
          if [ "$SCOPE" == "2nd-gen" ] && [ "$GIT_REF" != "refs/heads/gen2-beta" ]; then
            echo "ERROR: 2nd-gen scope must be published from the gen2-beta branch"
            exit 1
          fi

      - name: Verify OIDC token and configure NPM authentication
        id: npm-auth
        env:
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "✓ OIDC token is available for 1st-gen trusted publishing"
          else
            echo "✗ OIDC token NOT available - trusted publishing will fail"
            exit 1
          fi

          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "✓ NPM authentication configured for 2nd-gen (Adobe namespace)"

      - name: Build all packages
        run: yarn build

      - name: Generate custom elements manifests
        if: steps.extract-tag.outputs.scope != '2nd-gen'
        run: yarn workspace @spectrum-web-components/1st-gen custom-element-json

      - name: Confirm build artifacts
        if: steps.extract-tag.outputs.scope != '2nd-gen'
        run: yarn workspace @spectrum-web-components/1st-gen build:confirm

      # For scope=2nd-gen, version via Changesets pre mode (not snapshot). The
      # gen2-beta release script bumps 2.0.0-beta.N, writes changelogs, and prunes
      # stale changeset files before we pack and publish. Skipped on dry_run so
      # changelogs and .changeset/*.md files are left untouched.
      - name: Prepare gen2-beta release
        if: >-
          steps.extract-tag.outputs.scope == '2nd-gen' &&
          needs.check-changesets.outputs.has_2nd_gen_changesets == 'true' &&
          github.event.inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn release:gen2-beta

      - name: Version packages
        if: steps.extract-tag.outputs.scope != '2nd-gen'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.extract-tag.outputs.tag }}
        run: |
          if [ "$TAG" == "latest" ]; then
            yarn workspace @spectrum-web-components/1st-gen changelog:global
            yarn changeset version
          else
            yarn changeset version --snapshot $TAG
          fi

      - name: Capture released versions
        id: versions
        run: |
          CORE_VERSION=$(node -p "require('./2nd-gen/packages/core/package.json').version")
          BUNDLE_VERSION=$(node -p "require('./1st-gen/tools/bundle/package.json').version")
          SWC_VERSION=$(node -p "require('./2nd-gen/packages/swc/package.json').version")
          echo "core=$CORE_VERSION" >> $GITHUB_OUTPUT
          echo "bundle=$BUNDLE_VERSION" >> $GITHUB_OUTPUT
          echo "swc=$SWC_VERSION" >> $GITHUB_OUTPUT

      - name: Refresh lockfile and rebuild
        run: |
          yarn install --refresh-lockfile
          yarn build

      - name: Publish all packages
        if: steps.npm-auth.outcome == 'success' && steps.extract-tag.outputs.scope != '2nd-gen'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          TAG: ${{ steps.extract-tag.outputs.tag }}
        run: |
          # Changeset publishes all packages (1st-gen, core, and 2nd-gen)
          # npm CLI automatically uses:
          # - OIDC trusted publishing for 1st-gen packages (configured on npmjs.com)
          # - Token authentication for 2nd-gen (from .npmrc)
          if [ "$TAG" == "latest" ]; then
            yarn changeset publish --no-git-tag
          else
            yarn changeset publish --no-git-tag --tag $TAG
          fi

      - name: Publish 2nd-gen packages only
        if: >-
          steps.npm-auth.outcome == 'success' &&
          steps.extract-tag.outputs.scope == '2nd-gen' &&
          needs.check-changesets.outputs.has_2nd_gen_changesets == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          TAG: ${{ steps.extract-tag.outputs.tag }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          # Publish ONLY the 2nd-gen packages, leaving 1st-gen untouched even if
          # 1st-gen changesets are present in this run (they stay unpublished and
          # continue to release as `next` from the normal main pipeline).
          #
          # `yarn pack` resolves the workspace: protocol and honors each package's
          # files field, producing a publishable tarball. `npm publish` then selects
          # the correct auth automatically, matching how `changeset publish` behaves:
          # - @adobe/spectrum-wc-core -> npm token (from ~/.npmrc)
          # - @adobe/spectrum-wc      -> npm token (from ~/.npmrc)
          PUBLISH_FLAGS="--tag $TAG --access public"
          if [ "$DRY_RUN" == "true" ]; then
            PUBLISH_FLAGS="$PUBLISH_FLAGS --dry-run"
            echo "::notice::DRY RUN - pack and npm publish --dry-run only; versions, changelogs, and changesets are not modified"
          fi
          yarn workspace @adobe/spectrum-wc-core pack --out /tmp/swc-core.tgz
          yarn workspace @adobe/spectrum-wc pack --out /tmp/swc-wc.tgz
          npm publish /tmp/swc-core.tgz $PUBLISH_FLAGS
          npm publish /tmp/swc-wc.tgz $PUBLISH_FLAGS

      - name: Build React wrappers
        if: needs.check-changesets.outputs.has_1st_gen_changesets == 'true' && steps.extract-tag.outputs.scope != '2nd-gen'
        run: yarn workspace @spectrum-web-components/1st-gen build:react

      - name: Publish React wrappers
        if: needs.check-changesets.outputs.has_1st_gen_changesets == 'true' && steps.extract-tag.outputs.scope != '2nd-gen'
        env:
          TAG: ${{ steps.extract-tag.outputs.tag }}
        run: |
          if [ "$TAG" == "latest" ]; then
            PUBLISH_CMD="npm publish --access public"
          else
            PUBLISH_CMD="npm publish --tag $TAG --access public"
          fi

          # Retry function with exponential backoff
          retry_publish() {
            local dir=$1
            local max_attempts=3
            local attempt=1
            
            while [ $attempt -le $max_attempts ]; do
              echo "Publishing $dir (attempt $attempt/$max_attempts)..."
              if (cd "$dir" && $PUBLISH_CMD); then
                echo "✓ Successfully published $dir"
                return 0
              else
                if [ $attempt -lt $max_attempts ]; then
                  local wait_time=$((2 ** attempt))
                  echo "✗ Publish failed, retrying in ${wait_time}s..."
                  sleep $wait_time
                else
                  echo "✗ Failed to publish $dir after $max_attempts attempts"
                  return 1
                fi
              fi
              attempt=$((attempt + 1))
            done
          }

          cd 1st-gen/react
          for dir in */; do
            retry_publish "$dir" || exit 1
          done

      - name: Publish summary
        if: always()
        env:
          TAG: ${{ steps.extract-tag.outputs.tag }}
          SCOPE: ${{ steps.extract-tag.outputs.scope }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          AUTH_OUTCOME: ${{ steps.npm-auth.outcome }}
          CORE_VERSION: ${{ steps.versions.outputs.core }}
          BUNDLE_VERSION: ${{ steps.versions.outputs.bundle }}
          SWC_VERSION: ${{ steps.versions.outputs.swc }}
        run: |
          echo "## Publish summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$EVENT_NAME" == "pull_request" ]; then
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Trigger** | Pull request |" >> $GITHUB_STEP_SUMMARY
            echo "| **PR** | #${PR_NUMBER} — ${PR_TITLE} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Branch** | \`${HEAD_REF}\` → \`${BASE_REF}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **NPM tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Author** | @${PR_AUTHOR} |" >> $GITHUB_STEP_SUMMARY
          elif [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Trigger** | Manual dispatch |" >> $GITHUB_STEP_SUMMARY
            echo "| **Branch** | \`${REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **NPM tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Scope** | \`${SCOPE}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Actor** | @${ACTOR} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Trigger** | Push |" >> $GITHUB_STEP_SUMMARY
            echo "| **Branch** | \`${REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **NPM tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Commit** | \`${COMMIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$CORE_VERSION" ] || [ -n "$BUNDLE_VERSION" ] || [ -n "$SWC_VERSION" ]; then
            echo "## Versions released" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Generation | Package | Version |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|---------|---------|" >> $GITHUB_STEP_SUMMARY
            [ -n "$CORE_VERSION" ]   && echo "| Core    | \`@adobe/spectrum-wc-core\`   | \`${CORE_VERSION}\`   |" >> $GITHUB_STEP_SUMMARY
            [ -n "$BUNDLE_VERSION" ] && echo "| 1st gen | \`@spectrum-web-components/bundle\` | \`${BUNDLE_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
            [ -n "$SWC_VERSION" ]    && echo "| 2nd gen | \`@adobe/spectrum-wc\`               | \`${SWC_VERSION}\`    |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$AUTH_OUTCOME" == "success" ]; then
            echo "✅ Publish completed with tag \`${TAG}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Publish failed — NPM authentication did not succeed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push changes
        if: steps.extract-tag.outputs.tag == 'latest'
        run: |
          git add .
          git commit --no-verify -m "chore: release packages #publish" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      - name: Commit and push gen2-beta release
        if: >-
          github.event.inputs.dry_run != 'true' &&
          steps.extract-tag.outputs.scope == '2nd-gen' &&
          needs.check-changesets.outputs.has_2nd_gen_changesets == 'true' &&
          steps.npm-auth.outcome == 'success'
        env:
          SWC_VERSION: ${{ steps.versions.outputs.swc }}
        run: |
          git add .
          git commit --no-verify -m "chore(release): @adobe/spectrum-wc@${SWC_VERSION} #publish" || echo "No changes to commit"
          git pull --rebase origin gen2-beta
          git push origin gen2-beta

      - name: Create git tag
        if: steps.extract-tag.outputs.tag == 'latest'
        run: node ./1st-gen/scripts/create-git-tag.js

      - name: Create gen2 git tag
        if: >-
          github.event.inputs.dry_run != 'true' &&
          steps.extract-tag.outputs.scope == '2nd-gen' &&
          needs.check-changesets.outputs.has_2nd_gen_changesets == 'true' &&
          steps.npm-auth.outcome == 'success'
        run: node ./scripts/create-gen2-git-tag.js
