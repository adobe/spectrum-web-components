name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'NPM dist-tag for 1st-gen (e.g., latest, next, snapshot). 2nd-gen beta releases separately via publish-2nd-gen.yml.'
        required: false
        default: 'next'
  pull_request:
    types: [labeled, synchronize]
  push:
    branches:
      - main

concurrency:
  group: publish-1st-gen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-changesets:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'snapshot-release'))
    outputs:
      has_changesets: ${{ steps.check.outputs.has_changesets }}
      has_1st_gen_changesets: ${{ steps.check.outputs.has_1st_gen_changesets }}
      has_2nd_gen_changesets: ${{ steps.check.outputs.has_2nd_gen_changesets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changesets
        id: check
        run: |
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            echo "has_1st_gen_changesets=false" >> $GITHUB_OUTPUT
            echo "has_2nd_gen_changesets=false" >> $GITHUB_OUTPUT
            echo "No changesets found - skipping publish"
          else
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            CHANGESET_COUNT=$(ls -1 .changeset/*.md 2>/dev/null | grep -v README | wc -l | tr -d ' ')
            echo "Found $CHANGESET_COUNT changesets"

            HAS_1ST_GEN=false
            HAS_2ND_GEN=false
            for file in .changeset/*.md; do
              if [ "$(basename "$file")" != "README.md" ]; then
                PACKAGES=$(grep -oP "@spectrum-web-components/[a-z-]+" "$file" || true)
                NON_CORE=$(echo "$PACKAGES" | grep -v "^@spectrum-web-components/core$" || true)
                if [ -n "$NON_CORE" ]; then
                  HAS_1ST_GEN=true
                fi
                if grep -qE "@adobe/spectrum-wc-core|@adobe/spectrum-wc|@spectrum-web-components/core" "$file"; then
                  HAS_2ND_GEN=true
                fi
              fi
            done

            echo "has_1st_gen_changesets=$HAS_1ST_GEN" >> $GITHUB_OUTPUT
            echo "has_2nd_gen_changesets=$HAS_2ND_GEN" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: check-changesets
    # PR snapshot: version all gens under snapshot-test. Main/manual: 1st-gen only.
    if: >-
      (github.event_name == 'pull_request' &&
      needs.check-changesets.outputs.has_changesets == 'true') ||
      (github.event_name != 'pull_request' &&
      needs.check-changesets.outputs.has_1st_gen_changesets == 'true')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write
      contents: write
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup job and install dependencies
        uses: ./.github/actions/setup-job

      - name: Set Git identity
        run: |
          git config --global user.email "support+actions@github.com"
          git config --global user.name "github-actions-bot"

      - name: Determine release mode
        id: release-mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" == "pull_request" ]; then
            echo "mode=snapshot" >> $GITHUB_OUTPUT
            echo "tag=snapshot-test" >> $GITHUB_OUTPUT
          else
            echo "mode=release" >> $GITHUB_OUTPUT
            if [ -n "$INPUT_TAG" ]; then
              echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
            else
              echo "tag=next" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Validate release tag
        if: steps.release-mode.outputs.mode == 'release'
        env:
          TAG: ${{ steps.release-mode.outputs.tag }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$TAG" == "latest" ] && [ "$GIT_REF" != "refs/heads/main" ]; then
            echo "ERROR: Cannot publish 'latest' from non-main branch"
            exit 1
          fi

      - name: Verify OIDC token and configure NPM authentication
        id: npm-auth
        env:
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "✓ OIDC token is available for 1st-gen trusted publishing"
          else
            echo "✗ OIDC token NOT available - trusted publishing will fail"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      - name: Build all packages
        run: yarn build

      - name: Generate custom elements manifests
        run: yarn workspace @spectrum-web-components/1st-gen custom-element-json

      - name: Confirm build artifacts
        run: yarn workspace @spectrum-web-components/1st-gen build:confirm

      - name: Hold 2nd-gen-only changesets
        if: steps.release-mode.outputs.mode == 'release'
        run: yarn release:gen1-prep --hold-second-gen

      - name: Version packages (snapshot — all generations)
        if: steps.release-mode.outputs.mode == 'snapshot'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn changeset version --snapshot snapshot-test

      - name: Version packages (release — 1st-gen only)
        if: steps.release-mode.outputs.mode == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-mode.outputs.tag }}
        run: |
          if [ "$TAG" == "latest" ]; then
            yarn workspace @spectrum-web-components/1st-gen changelog:global
            yarn changeset version
          else
            yarn changeset version --snapshot $TAG
          fi

      - name: Revert 2nd-gen version churn
        if: steps.release-mode.outputs.mode == 'release'
        run: yarn release:gen1-prep --revert-second-gen-churn

      - name: Capture released versions
        id: versions
        run: |
          BUNDLE_VERSION=$(node -p "require('./1st-gen/tools/bundle/package.json').version")
          CORE_VERSION=$(node -p "require('./2nd-gen/packages/core/package.json').version")
          SWC_VERSION=$(node -p "require('./2nd-gen/packages/swc/package.json').version")
          echo "bundle=$BUNDLE_VERSION" >> $GITHUB_OUTPUT
          echo "core=$CORE_VERSION" >> $GITHUB_OUTPUT
          echo "swc=$SWC_VERSION" >> $GITHUB_OUTPUT

      - name: Refresh lockfile and rebuild
        run: |
          yarn install --refresh-lockfile
          yarn build

      - name: Publish packages
        if: steps.npm-auth.outcome == 'success'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          TAG: ${{ steps.release-mode.outputs.tag }}
          MODE: ${{ steps.release-mode.outputs.mode }}
        run: |
          if [ "$MODE" == "snapshot" ]; then
            yarn changeset publish --no-git-tag --tag snapshot-test
          elif [ "$TAG" == "latest" ]; then
            yarn changeset publish --no-git-tag
          else
            yarn changeset publish --no-git-tag --tag $TAG
          fi

      - name: Build React wrappers
        if: >-
          steps.release-mode.outputs.mode == 'release' &&
          needs.check-changesets.outputs.has_1st_gen_changesets == 'true'
        run: yarn workspace @spectrum-web-components/1st-gen build:react

      - name: Publish React wrappers
        if: >-
          steps.release-mode.outputs.mode == 'release' &&
          needs.check-changesets.outputs.has_1st_gen_changesets == 'true'
        env:
          TAG: ${{ steps.release-mode.outputs.tag }}
        run: |
          if [ "$TAG" == "latest" ]; then
            PUBLISH_CMD="npm publish --access public"
          else
            PUBLISH_CMD="npm publish --tag $TAG --access public"
          fi

          retry_publish() {
            local dir=$1
            local max_attempts=3
            local attempt=1

            while [ $attempt -le $max_attempts ]; do
              echo "Publishing $dir (attempt $attempt/$max_attempts)..."
              if (cd "$dir" && $PUBLISH_CMD); then
                echo "✓ Successfully published $dir"
                return 0
              else
                if [ $attempt -lt $max_attempts ]; then
                  local wait_time=$((2 ** attempt))
                  echo "✗ Publish failed, retrying in ${wait_time}s..."
                  sleep $wait_time
                else
                  echo "✗ Failed to publish $dir after $max_attempts attempts"
                  return 1
                fi
              fi
              attempt=$((attempt + 1))
            done
          }

          cd 1st-gen/react
          for dir in */; do
            retry_publish "$dir" || exit 1
          done

      - name: Publish summary
        if: always()
        env:
          TAG: ${{ steps.release-mode.outputs.tag }}
          MODE: ${{ steps.release-mode.outputs.mode }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          AUTH_OUTCOME: ${{ steps.npm-auth.outcome }}
          BUNDLE_VERSION: ${{ steps.versions.outputs.bundle }}
          CORE_VERSION: ${{ steps.versions.outputs.core }}
          SWC_VERSION: ${{ steps.versions.outputs.swc }}
        run: |
          echo "## Publish summary (${MODE})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | \`${MODE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **NPM tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "$MODE" == "release" ]; then
            echo "| **2nd-gen beta** | Use \`publish-2nd-gen.yml\` (runs separately on \`main\`) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "$BUNDLE_VERSION" ] || [ -n "$CORE_VERSION" ] || [ -n "$SWC_VERSION" ]; then
            echo "## Versions" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Generation | Package | Version |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|---------|---------|" >> $GITHUB_STEP_SUMMARY
            [ -n "$BUNDLE_VERSION" ] && echo "| 1st gen | \`@spectrum-web-components/bundle\` | \`${BUNDLE_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
            [ -n "$CORE_VERSION" ] && echo "| 2nd gen | \`@adobe/spectrum-wc-core\` | \`${CORE_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
            [ -n "$SWC_VERSION" ] && echo "| 2nd gen | \`@adobe/spectrum-wc\` | \`${SWC_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push changes
        if: >-
          steps.release-mode.outputs.mode == 'release' &&
          steps.release-mode.outputs.tag == 'latest'
        run: |
          git add .
          git commit --no-verify -m "chore: release packages #publish" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      - name: Create git tag
        if: >-
          steps.release-mode.outputs.mode == 'release' &&
          steps.release-mode.outputs.tag == 'latest'
        run: node ./1st-gen/scripts/create-git-tag.js
